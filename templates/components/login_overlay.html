<section id="login-overlay" class="hidden" aria-modal="true" role="dialog">
    <form class="login-panel" id="login-form">
        <div class="login-title">Acesso coreCraft</div>
        <div class="login-subtitle">Informe o token configurado em APP_AUTH_TOKEN para liberar o painel, terminal RPC e eventos em tempo real.</div>
        <input class="login-input" id="login-token" type="password" autocomplete="current-password" spellcheck="false" placeholder="APP_AUTH_TOKEN">
        <div class="login-actions">
            <button class="btn login-submit" id="login-submit" type="submit">Entrar</button>
        </div>
    </form>
</section>
